<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trợ Lý Email AI - Gemini 2.5 Flash</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📧 Trợ Lý Viết Email</h1>
            <p>Sử dụng công nghệ AI Gemini 2.5 Flash</p>
        </div>

        <div class="content">
            <form id="emailForm">
                <div class="two-column">
                    <div class="form-group">
                        <label for="customerName">👤 Tên Khách Hàng *</label>
                        <input type="text" id="customerName" placeholder="Nhập tên khách hàng" required>
                    </div>
                    <div class="form-group">
                        <label for="productService">🎁 Sản Phẩm/Dịch Vụ *</label>
                        <input type="text" id="productService" placeholder="VD: Kem dưỡng da" required>
                    </div>
                </div>

                <div class="two-column">
                    <div class="form-group">
                        <label for="gender">👥 Xưng hô *</label>
                        <select id="gender" required>
                            <option value="Anh/Chị">Tự động</option>
                            <option value="Anh">Anh</option>
                            <option value="Chị">Chị</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="emailType">📝 Loại Email *</label>
                        <select id="emailType" required>
                            <option value="Giới thiệu sản phẩm">Giới thiệu sản phẩm</option>
                            <option value="Cảm ơn khách hàng">Cảm ơn</option>
                            <option value="Giải quyết khiếu nại">Khiếu nại</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="detailInfo">📋 Thông tin chi tiết *</label>
                    <textarea id="detailInfo" rows="4" placeholder="Nhập nội dung muốn truyền tải..." required></textarea>
                </div>

                <div class="button-group">
                    <button type="button" class="btn btn-secondary" onclick="resetForm()">🔄 Làm Mới</button>
                    <button type="button" class="btn btn-primary" id="createDraftBtn" onclick="createEmailDraft()">✨ Tạo Email Bản Nháp</button>
                </div>
            </form>

            <div id="emailPreview" style="display: none; margin-top: 30px;">
                <h3 style="color: #d4a574;">📧 Kết quả:</h3>
                <div id="emailContent" style="white-space: pre-wrap; background: #fff; padding: 20px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 15px;"></div>
                <button type="button" class="btn btn-primary" onclick="copyToClipboard()">📋 Sao Chép Nội Dung</button>
            </div>
        </div>
    </div>

    <div id="errorModal" class="modal" style="display:none; position:fixed; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">
        <div style="background:#fff; margin:15% auto; padding:20px; border-radius:10px; width:300px; text-align:center;">
            <p id="errorMessage"></p>
            <button onclick="closeErrorModal()">Đóng</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
